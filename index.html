<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Razonamiento cuantitativo 1</title>
    <meta name="description" content="Herramienta educativa para clasificar números en conjuntos (narutales, enteros, racionales) y resolver operaciones aritmeticas paso a paso.">
    <link rel="stylesheet" href="css/style.css"
</head>
<body>
    <div class="principal">
        <nav class="tabs-nav" role="tablist">
            <button class="tab-btn" role="tab">
                <spam class="nab-tab-text">Conjuntos de números</spam>
            </button>
            <button class="tab-btn" role="tab">
               <spam class="nab-tab-text">Operaciones Aritmeticas</spam>
            </button>
            <button class="tab-btn" role="tab">
                <spam class="nab-tab-text">:D</spam>
            </button>
        </nav>

        <section id="panel-clasificado" class="tab-panel active">
            <div class="card">
                <div class="card-header">
                    <h2>Clasificador de conjunto Números</h2>
                    <p>Ingresa un numero y selecciona un conjunto para verificar si pertenece a a el</p>
                </div>
            
                
                <div class="card-body">
                    <div class="card-object">
                        <label>Inserte el Número:</label>
                        <input type="text" id="numero-input" placeholder="EJ: 1, -8, 3/4, 7.6">
                <div>
            </div>
            
            <div class="card-object">
                <select id="selec-conjuntos">
                    <option value="">Selecciona un conjunto</option>
                    <option value="naturales">Naturales</option>
                    <option value="enteros">Enteros</option>
                    <option value="racionales">Racionales</option>
                </select>
            </div>
            <button class="tab-btn" id="btn-clasificador" type="button">Evaluar</button>
        </section>

    
    </div>
</body>
</html>
